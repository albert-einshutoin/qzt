name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: check (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.87.0"]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: make check
      # `make check` compiles examples; execute the public usage path once to
      # catch runtime-only regressions without duplicating it on the MSRV lane.
      - name: Run public evidence example
        if: matrix.toolchain == 'stable'
        run: cargo run --locked --example evidence_ref

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo package --allow-dirty

  dependency-policy:
    name: dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # OSV Scanner owns vulnerability advisories. This gate independently
      # enforces licenses, banned dependencies, and trusted package sources.
      - name: Audit product dependencies
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          rust-version: "1.87.0"
          command: check bans licenses sources
          arguments: --all-features
      - name: Audit fuzz dependencies
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          rust-version: "1.87.0"
          manifest-path: fuzz/Cargo.toml
          command: check bans licenses sources

  coverage:
    name: line coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-llvm-cov@0.8.6
          fallback: none
      - run: make coverage

  windows-release-build:
    name: windows release build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The release path exercises platform-specific positioned file reads that
      # Linux CI cannot compile, so keep Windows portability in the normal gate.
      - run: cargo test --release --locked --lib io::tests::windows_positioned_read
      - run: cargo test --release --locked --features internal-testing --test phase21_evidence_retrieval windows_file_backed
      - run: cargo build --release --locked

  dist-workflow:
    name: dist workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install digest-pinned cargo-dist
        shell: bash
        run: scripts/install-cargo-dist-linux.sh
      - run: make dist-check
