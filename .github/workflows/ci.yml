name: ci

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  check:
    name: check (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.87.0"]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Validate CI impact tool
        if: matrix.toolchain == 'stable'
        run: python3 -m unittest discover -s ci/tests -v
      # Formatting, linting, type/compile checks, and all-target compilation
      # remain mandatory on every PR regardless of the selected test plan.
      - run: make fmt clippy check-default
      # `make check` compiles examples; execute the public usage path once to
      # catch runtime-only regressions without duplicating it on the MSRV lane.
      - name: Run public evidence example
        if: matrix.toolchain == 'stable'
        run: cargo run --locked --example evidence_ref

  tests:
    name: tests (${{ github.event_name == 'pull_request' && 'impact-selected' || 'full' }})
    runs-on: ubuntu-latest
    steps:
      # Full history is required for merge-base, rename, copy, and deletion
      # detection. If revisions still cannot be resolved, impact.py chooses full.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Decide test strategy
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base_revision="$PR_BASE_SHA"
            force_full=()
          else
            base_revision="$HEAD_SHA"
            force_full=(--force-full "non-PR CI requires full validation")
          fi
          python3 ci/impact.py plan \
            --repository . \
            --base "$base_revision" \
            --head "$HEAD_SHA" \
            --config ci/config/impact.json \
            --adapter ci/adapters/rust.json \
            --output target/ci/impact-plan.json \
            "${force_full[@]}"
      - name: Run planned tests
        run: >-
          python3 ci/impact.py run
          --repository .
          --plan target/ci/impact-plan.json
          --adapter ci/adapters/rust.json
          --summary target/ci/test-summary.json
      - name: Upload test selection evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-impact-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            target/ci/impact-plan.json
            target/ci/test-summary.json
          if-no-files-found: error
          retention-days: 14

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo package --allow-dirty

  dependency-policy:
    name: dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # OSV Scanner owns vulnerability advisories. This gate independently
      # enforces licenses, banned dependencies, and trusted package sources.
      - name: Audit product dependencies
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          rust-version: "1.87.0"
          command: check bans licenses sources
          arguments: --all-features
      - name: Audit fuzz dependencies
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          rust-version: "1.87.0"
          manifest-path: fuzz/Cargo.toml
          command: check bans licenses sources

  coverage:
    name: line coverage
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-llvm-cov@0.8.6
          fallback: none
      - run: make coverage

  windows-release-build:
    name: windows release build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The release path exercises platform-specific positioned file reads that
      # Linux CI cannot compile, so keep Windows portability in the normal gate.
      - run: cargo test --release --locked --lib io::tests::windows_positioned_read
      - run: cargo test --release --locked --features internal-testing --test phase21_evidence_retrieval windows_file_backed
      - run: cargo build --release --locked

  dist-workflow:
    name: dist workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install digest-pinned cargo-dist
        shell: bash
        run: scripts/install-cargo-dist-linux.sh
      - run: make dist-check
